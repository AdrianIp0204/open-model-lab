name: Public Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: public-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene-static:
    name: Public Validation (hygiene-static)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run public-release hygiene checks
        run: |
          pnpm public-release:hygiene
          pnpm public-release:final-check
          pnpm github:labels:plan

      - name: Run lint and typecheck
        run: |
          pnpm lint
          pnpm typecheck

  tests:
    name: Public Validation (tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit and component tests
        run: pnpm test
