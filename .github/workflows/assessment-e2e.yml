name: Assessment E2E

on:
  pull_request:
    paths:
      - ".github/workflows/assessment-e2e.yml"
      - "app/**"
      - "components/**"
      - "content/**"
      - "hooks/**"
      - "i18n/**"
      - "lib/**"
      - "messages/**"
      - "next.config.ts"
      - "package.json"
      - "playwright.config.ts"
      - "pnpm-lock.yaml"
      - "public/**"
      - "tests/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/assessment-e2e.yml"
      - "app/**"
      - "components/**"
      - "content/**"
      - "hooks/**"
      - "i18n/**"
      - "lib/**"
      - "messages/**"
      - "next.config.ts"
      - "package.json"
      - "playwright.config.ts"
      - "pnpm-lock.yaml"
      - "public/**"
      - "tests/**"

concurrency:
  group: assessment-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assessment-e2e:
    name: Assessment E2E (${{ matrix.lane }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: journeys
            command: pnpm exec playwright test tests/e2e/assessment-journeys.spec.ts
          - lane: resume-sync
            command: pnpm exec playwright test tests/e2e/assessment-resume.spec.ts tests/e2e/assessment-resume-hydration.spec.ts tests/e2e/assessment-synced-progress.spec.ts
          - lane: entry-recommendations
            command: pnpm exec playwright test tests/e2e/concept-test-entry-contract.spec.ts tests/e2e/concept-test-standalone.spec.ts tests/e2e/test-hub-recommendations.spec.ts tests/e2e/concept-quiz-retry-flow.spec.ts tests/e2e/learning-surface-concept-tests.spec.ts

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run assessment browser suite
        run: ${{ matrix.command }}

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: assessment-playwright-artifacts-${{ matrix.lane }}
          path: output/playwright
          if-no-files-found: ignore
