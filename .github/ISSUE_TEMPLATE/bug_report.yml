name: Bug report
description: Report a product or code bug in Open Model Lab.
title: "[Bug]: "
labels:
  - "type: bug"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, private account data, payment details, real tokens, private URLs, or vulnerability details.
  - type: input
    id: affected-route
    attributes:
      label: Affected route, page, or tool
      description: Example: /concepts/newton-second-law, /tools/chemistry-reaction-mind-map, /account
    validations:
      required: true
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact route, inputs, clicks, and any relevant state.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: account-state
    attributes:
      label: Account state
      options:
        - Signed out
        - Signed in free
        - Signed in Supporter
        - Local dev harness
        - Not sure / not relevant
    validations:
      required: false
  - type: input
    id: browser-device
    attributes:
      label: Browser and device
      description: Browser, OS, viewport, or device if relevant.
      placeholder: Chrome on Windows, Safari on iPhone, etc.
    validations:
      required: false
  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots or logs
      description: Optional. Redact emails, account IDs, tokens, private URLs, billing IDs, and user data.
    validations:
      required: false
  - type: textarea
    id: checks
    attributes:
      label: Checks run
      description: Optional. Mention commands, browser checks, or local reproduction attempts.
    validations:
      required: false
